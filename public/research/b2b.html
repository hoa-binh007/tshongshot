<!doctype html>
<html lang="vi">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>HongShot B2B Interview</title><link rel="stylesheet" href="app.css"/></head>
<body><div class="wrap">
  <div class="top"><div><a class="small" href="index.html">← Research</a><div class="brand">HongShot B2B</div><div class="small" data-de="Vollständiges Interviewformular · Codebuch-konform" data-vi="Phiếu phỏng vấn đầy đủ · đúng codebook" data-en="Full interview form · codebook compliant"></div></div><div class="lang"><button id="btnVi" type="button">VI</button><button id="btnEn" type="button">EN</button><button id="btnDe" type="button">DE</button></div></div>
  <div class="card"><div class="inlineMeta"><div class="metaBox"><span data-de="Schritt" data-vi="Bước" data-en="Step"></span> <span id="stepNow">1</span> / 7</div><div class="metaBox">ID: <strong id="previewId">---</strong></div><div class="metaBox"><span data-de="Score" data-vi="Điểm" data-en="Score"></span>: <strong id="previewScore">0</strong>/25</div></div><div class="progress"><div id="bar"></div></div></div>
  <form id="b2bForm" class="card" novalidate>
    <section class="step active" data-step="1"><h1 class="stepTitle" data-de="1. Stammdaten & Betrieb" data-vi="1. Thông tin cơ bản & cơ sở" data-en="1. Metadata & business"></h1><div class="formGrid">
      <div><label>interviewer_id *</label><select name="interviewer_id" required><option value="">---</option><option value="INT-01">INT-01</option><option value="INT-02">INT-02</option><option value="ADMIN">ADMIN</option></select></div>
      <div><label data-de="Stadt *" data-vi="Thành phố *" data-en="City *"></label><select name="city" required><option value="">---</option><option value="Da Lat">Đà Lạt</option><option value="Saigon">Saigon</option><option value="Other">Other</option></select></div>
      <div><label>business_type *</label><select name="business_type" required><option value="">---</option><option value="1" data-de="Modernes Café" data-vi="Café hiện đại" data-en="Modern café"></option><option value="2" data-de="Koreanisches Café" data-vi="Café Hàn Quốc" data-en="Korean café"></option><option value="3" data-de="Traditionelles Café" data-vi="Café truyền thống" data-en="Traditional café"></option><option value="4" data-de="Hotel" data-vi="Khách sạn" data-en="Hotel"></option><option value="5" data-de="Coworking Space" data-vi="Coworking" data-en="Coworking space"></option><option value="6" data-de="Fitness/Wellness" data-vi="Fitness/Wellness" data-en="Fitness/Wellness"></option><option value="7" data-de="Premium-Shop" data-vi="Cửa hàng cao cấp" data-en="Premium shop"></option><option value="8" data-de="Convenience Store" data-vi="Cửa hàng tiện lợi" data-en="Convenience store"></option><option value="9" data-de="Sonstiges" data-vi="Khác" data-en="Other"></option></select></div>
      <div class="condition hidden" data-condition="business_type:9"><label>business_type_other</label><input name="business_type_other" maxlength="100"></div>
      <div><label>business_name *</label><input name="business_name" required maxlength="100"></div><div><label>district / address *</label><input name="district" required maxlength="200"></div><div><label>contact_name</label><input name="contact_name" maxlength="100"></div>
      <div><label>contact_role *</label><select name="contact_role" required><option value="">---</option><option value="1" data-de="Owner / Inhaber" data-vi="Chủ" data-en="Owner"></option><option value="2" data-de="Manager" data-vi="Quản lý" data-en="Manager"></option><option value="3" data-de="Einkauf" data-vi="Mua hàng" data-en="Purchasing"></option><option value="4" data-de="Mitarbeiter" data-vi="Nhân viên" data-en="Staff"></option><option value="5" data-de="Sonstiges" data-vi="Khác" data-en="Other"></option></select></div>
      <div><label>interview_language *</label><select name="interview_language" required><option value="1">Tiếng Việt</option><option value="2">English</option><option value="3">Deutsch</option></select></div><div><label>interview_date *</label><input name="interview_date" type="date" required></div></div>
      <div class="btnRow"><button class="btn secondary" type="button" id="gpsBtn" data-de="GPS erfassen" data-vi="Lấy GPS" data-en="Capture GPS"></button><span class="small" id="gpsStatus">GPS: ---</span></div><input type="hidden" name="gps_lat"><input type="hidden" name="gps_lng"><input type="hidden" name="time_start"><input type="hidden" name="time_end"><input type="hidden" name="duration_min"><input type="hidden" name="interview_id"><input type="hidden" name="total_score"><input type="hidden" name="photo_count" value="0">
    </section>

    <section class="step" data-step="2"><h1 class="stepTitle" data-de="2. Interesse & Zielgruppen" data-vi="2. Mức quan tâm & nhóm khách" data-en="2. Interest & target groups"></h1><div class="formGrid"><div><label>has_functional_drinks *</label><select name="has_functional_drinks" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="0" data-de="Nein" data-vi="Không" data-en="No"></option></select></div><div class="condition hidden" data-condition="has_functional_drinks:1"><label>existing_products_text</label><textarea name="existing_products_text"></textarea></div><div><label>willing_to_test *</label><select name="willing_to_test" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div><div><label>reason_text</label><textarea name="reason_text"></textarea></div></div>
      <h3 data-de="Passende Zielgruppen" data-vi="Nhóm khách phù hợp" data-en="Suitable target groups"></h3><div class="checkGrid"><label class="checkItem"><input type="checkbox" name="target_tourists"><span data-de="Touristen" data-vi="Khách du lịch" data-en="Tourists"></span></label><label class="checkItem"><input type="checkbox" name="target_office"><span data-de="Büroangestellte" data-vi="Nhân viên văn phòng" data-en="Office workers"></span></label><label class="checkItem"><input type="checkbox" name="target_health"><span data-de="Gesundheitsbewusste" data-vi="Người quan tâm sức khỏe" data-en="Health-conscious customers"></span></label><label class="checkItem"><input type="checkbox" name="target_young"><span data-de="Junge Zielgruppe" data-vi="Người trẻ" data-en="Young customers"></span></label><label class="checkItem"><input type="checkbox" name="target_senior"><span data-de="Ältere Zielgruppe" data-vi="Người lớn tuổi" data-en="Senior customers"></span></label></div>
    </section>

    <section class="step" data-step="3"><h1 class="stepTitle" data-de="3. Preis & Marge" data-vi="3. Giá & biên lợi nhuận" data-en="3. Price & margin"></h1><div class="formGrid"><div><label>retail_price_realistic * (VND)</label><input name="retail_price_realistic" type="number" min="10000" max="200000" required></div><div><label>retail_price_too_expensive * (VND)</label><input name="retail_price_too_expensive" type="number" min="10000" max="300000" required></div><div><label>margin_required_pct * (%)</label><input name="margin_required_pct" type="number" min="10" max="200" required></div><div><label>wholesale_price_accepted * (VND)</label><input name="wholesale_price_accepted" type="number" min="5000" max="150000" required><div class="fieldHelp" id="wholesaleHint"></div></div><div><label>accept_35k *</label><select name="accept_35k" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div><div><label>accept_45k *</label><select name="accept_45k" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div><div><label>accept_55k *</label><select name="accept_55k" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div></div></section>

    <section class="step" data-step="4"><h1 class="stepTitle" data-de="4. Produktform" data-vi="4. Hình thức sản phẩm" data-en="4. Product format"></h1><h3 data-de="Welche Produktformen passen?" data-vi="Hình thức nào phù hợp?" data-en="Which product formats fit?"></h3><div class="checkGrid"><label class="checkItem"><input type="checkbox" name="form_shot"><span>Shot</span></label><label class="checkItem"><input type="checkbox" name="form_bottle"><span data-de="Flasche" data-vi="Chai" data-en="Bottle"></span></label><label class="checkItem"><input type="checkbox" name="form_hot_drink"><span data-de="Heißgetränk" data-vi="Đồ uống nóng" data-en="Hot drink"></span></label><label class="checkItem"><input type="checkbox" name="form_machine"><span data-de="Maschine" data-vi="Máy" data-en="Machine"></span></label><label class="checkItem"><input type="checkbox" name="form_giftbox"><span data-de="Geschenkbox" data-vi="Hộp quà" data-en="Gift box"></span></label><label class="checkItem"><input type="checkbox" name="form_stick"><span>Stick</span></label><label class="checkItem"><input type="checkbox" name="form_powder"><span data-de="Pulver" data-vi="Bột" data-en="Powder"></span></label></div><div class="formGrid"><div><label>machine_feasibility *</label><select name="machine_feasibility" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div><div><label>machine_conditions_text</label><textarea name="machine_conditions_text"></textarea></div></div><div class="scaleWrap"><label>giftbox_interest *</label><input type="hidden" name="giftbox_interest" required><div class="scale" data-scale-buttons="giftbox_interest"></div><div class="anchors" data-anchor="giftbox_interest"></div></div></section>

    <section class="step" data-step="5"><h1 class="stepTitle" data-de="5. Betrieb & Logistik" data-vi="5. Vận hành & logistics" data-en="5. Operations & logistics"></h1><div class="formGrid"><div><label>delivery_frequency *</label><select name="delivery_frequency" required><option value="">---</option><option value="1" data-de="Täglich" data-vi="Hằng ngày" data-en="Daily"></option><option value="2" data-de="Wöchentlich" data-vi="Hằng tuần" data-en="Weekly"></option><option value="3" data-de="Monatlich" data-vi="Hằng tháng" data-en="Monthly"></option><option value="4" data-de="Auf Anfrage" data-vi="Theo yêu cầu" data-en="On demand"></option></select></div><div><label>min_order_qty *</label><input name="min_order_qty" type="number" min="1" max="10000" required></div><div><label>weekly_sales_estimate *</label><input name="weekly_sales_estimate" type="number" min="0" max="10000" required></div><div><label>cold_storage *</label><select name="cold_storage" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="0" data-de="Nein" data-vi="Không" data-en="No"></option></select></div><div><label>shelf_space *</label><select name="shelf_space" required><option value="">---</option><option value="1" data-de="Ja, gut verfügbar" data-vi="Có, sẵn có" data-en="Yes, well available"></option><option value="2" data-de="Begrenzt" data-vi="Hạn chế" data-en="Limited"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div><div><label>sampling_possible *</label><select name="sampling_possible" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div></div><p><label>sampling_conditions_text</label><textarea name="sampling_conditions_text"></textarea></p></section>

    <section class="step" data-step="6"><h1 class="stepTitle" data-de="6. Konkurrenz & Korean Branding" data-vi="6. Đối thủ & thương hiệu Hàn Quốc" data-en="6. Competition & Korean branding"></h1><div class="formGrid"><div><label>has_similar_products *</label><select name="has_similar_products" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="0" data-de="Nein" data-vi="Không" data-en="No"></option></select></div><div class="condition hidden" data-condition="has_similar_products:1"><label>similar_products_text</label><textarea name="similar_products_text"></textarea></div><div><label>best_selling_text</label><textarea name="best_selling_text"></textarea></div><div><label>poor_selling_text</label><textarea name="poor_selling_text"></textarea></div><div><label>korean_branding_effect *</label><select name="korean_branding_effect" required><option value="">---</option><option value="1" data-de="Plus (hilft)" data-vi="Cộng (giúp ích)" data-en="Plus (helps)"></option><option value="2" data-de="Neutral" data-vi="Trung lập" data-en="Neutral"></option><option value="3" data-de="Minus (Nachteil)" data-vi="Trừ (bất lợi)" data-en="Minus (disadvantage)"></option></select></div><div><label>korean_branding_reason_text</label><textarea name="korean_branding_reason_text"></textarea></div></div></section>

    <section class="step" data-step="7"><h1 class="stepTitle" data-de="7. Bewertung & Abschluss" data-vi="7. Đánh giá & kết thúc" data-en="7. Rating & finish"></h1><p><label>key_quote_text *</label><textarea name="key_quote_text" maxlength="500" required></textarea></p><div class="formGrid"><div class="scaleWrap"><label>score_interest *</label><input type="hidden" name="score_interest" required><div class="scale" data-scale-buttons="score_interest"></div><div class="anchors" data-anchor="score_interest"></div></div><div class="scaleWrap"><label>score_premium_fit *</label><input type="hidden" name="score_premium_fit" required><div class="scale" data-scale-buttons="score_premium_fit"></div><div class="anchors" data-anchor="score_premium_fit"></div></div><div class="scaleWrap"><label>score_korean_fit *</label><input type="hidden" name="score_korean_fit" required><div class="scale" data-scale-buttons="score_korean_fit"></div><div class="anchors" data-anchor="score_korean_fit"></div></div><div class="scaleWrap"><label>score_expected_sales *</label><input type="hidden" name="score_expected_sales" required><div class="scale" data-scale-buttons="score_expected_sales"></div><div class="anchors" data-anchor="score_expected_sales"></div></div><div class="scaleWrap"><label>score_pilot_openness *</label><input type="hidden" name="score_pilot_openness" required><div class="scale" data-scale-buttons="score_pilot_openness"></div><div class="anchors" data-anchor="score_pilot_openness"></div></div><div><label data-de="Gesamtpunktzahl" data-vi="Tổng điểm" data-en="Total score"></label><div class="totalScore"><span id="totalScoreView">0</span>/25</div></div><div><label>followup_agreed *</label><select name="followup_agreed" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="0" data-de="Nein" data-vi="Không" data-en="No"></option></select></div><div class="condition hidden" data-condition="followup_agreed:1"><label>followup_date</label><input name="followup_date" type="date"></div></div><div id="errorBox" class="errorBox hidden"></div><div id="resultBox" class="successBox hidden"><strong>Saved:</strong> <span id="resultId"></span></div><div class="notice" data-de="Beim Speichern wird eine JSON-Datei heruntergeladen und zusätzlich lokal im Browser gespeichert. Firebase kommt im nächsten Schritt." data-vi="Khi lưu, file JSON sẽ được tải xuống và lưu cục bộ trong trình duyệt. Firebase sẽ nối ở bước tiếp theo." data-en="On save, a JSON file is downloaded and stored locally in the browser. Firebase follows in the next step."></div></section>
    <div class="btnRow"><button class="btn secondary" id="prevBtn" type="button" data-de="Zurück" data-vi="Quay lại" data-en="Back"></button><button class="btn" id="nextBtn" type="button" data-de="Weiter" data-vi="Tiếp" data-en="Next"></button><button class="btn hidden" id="saveBtn" type="button" data-de="Speichern" data-vi="Lưu" data-en="Save"></button></div>
  </form><div class="footer">HongShot B2B v2 · Codebook fields · JSON backup</div>
</div><script src="app.js"></script><script src="b2b.js"></script></body></html>
