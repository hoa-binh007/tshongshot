<!doctype html>
<html lang="vi">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>HongShot B2B Interview</title><link rel="stylesheet" href="app.css"/></head>
<body><div class="wrap">
  <div class="top"><div><a class="small" href="index.html">← Research</a><div class="brand">HongShot B2B</div><div class="small" data-de="Vollständiges Interviewformular · Codebuch-konform" data-vi="Phiếu phỏng vấn đầy đủ · đúng codebook" data-en="Full interview form · codebook compliant"></div></div><div class="lang"><button id="btnVi" type="button">VI</button><button id="btnEn" type="button">EN</button><button id="btnDe" type="button">DE</button></div></div>
  <div class="card"><div class="inlineMeta"><div class="metaBox"><span data-de="Schritt" data-vi="Bước" data-en="Step"></span> <span id="stepNow">1</span> / 7</div><div class="metaBox">ID: <strong id="previewId">---</strong></div><div class="metaBox"><span data-de="Score" data-vi="Điểm" data-en="Score"></span>: <strong id="previewScore">0</strong>/25</div></div><div class="progress"><div id="bar"></div></div></div>
  <form id="b2bForm" class="card" novalidate>

    <section class="step active" data-step="1">
      <h1 class="stepTitle" data-de="1. Stammdaten & Betrieb" data-vi="1. Thông tin cơ bản & cơ sở" data-en="1. Metadata & business"></h1>
      <div class="formGrid">
        <div><label data-de="Interviewer *" data-vi="Người phỏng vấn *" data-en="Interviewer *"></label><select name="interviewer_id" required><option value="">---</option><option value="INT-01">INT-01</option><option value="INT-02">INT-02</option><option value="ADMIN">ADMIN</option></select></div>
        <div><label data-de="Stadt *" data-vi="Thành phố *" data-en="City *"></label><select name="city" required><option value="">---</option><option value="Da Lat">Đà Lạt</option><option value="Saigon">Saigon</option><option value="Other">Other</option></select></div>
        <div><label data-de="Betriebstyp *" data-vi="Loại hình cơ sở *" data-en="Business type *"></label><select name="business_type" required><option value="">---</option><option value="1" data-de="Modernes Café" data-vi="Café hiện đại" data-en="Modern café"></option><option value="2" data-de="Koreanisches Café" data-vi="Café Hàn Quốc" data-en="Korean café"></option><option value="3" data-de="Traditionelles Café" data-vi="Café truyền thống" data-en="Traditional café"></option><option value="4" data-de="Hotel" data-vi="Khách sạn" data-en="Hotel"></option><option value="5" data-de="Coworking Space" data-vi="Coworking" data-en="Coworking space"></option><option value="6" data-de="Fitness/Wellness" data-vi="Fitness/Wellness" data-en="Fitness/Wellness"></option><option value="7" data-de="Premium-Shop" data-vi="Cửa hàng cao cấp" data-en="Premium shop"></option><option value="8" data-de="Convenience Store" data-vi="Cửa hàng tiện lợi" data-en="Convenience store"></option><option value="9" data-de="Sonstiges" data-vi="Khác" data-en="Other"></option></select></div>
        <div class="condition hidden" data-condition="business_type:9"><label data-de="Sonstiger Betriebstyp" data-vi="Loại hình khác" data-en="Other business type"></label><input name="business_type_other" maxlength="100"></div>
        <div><label data-de="Betriebsname *" data-vi="Tên cơ sở *" data-en="Business name *"></label><input name="business_name" required maxlength="100"></div>
        <div><label data-de="Adresse / Bezirk *" data-vi="Địa chỉ / Phường *" data-en="Address / district *"></label><input name="district" required maxlength="200"></div>
        <div><label data-de="Kontaktperson" data-vi="Tên người liên hệ" data-en="Contact name"></label><input name="contact_name" maxlength="100"></div>
        <div><label data-de="Funktion *" data-vi="Chức vụ *" data-en="Role *"></label><select name="contact_role" required><option value="">---</option><option value="1" data-de="Inhaber" data-vi="Chủ" data-en="Owner"></option><option value="2" data-de="Manager" data-vi="Quản lý" data-en="Manager"></option><option value="3" data-de="Einkauf" data-vi="Mua hàng" data-en="Purchasing"></option><option value="4" data-de="Mitarbeiter" data-vi="Nhân viên" data-en="Staff"></option><option value="5" data-de="Sonstiges" data-vi="Khác" data-en="Other"></option></select></div>
        <div><label data-de="Interviewsprache *" data-vi="Ngôn ngữ phỏng vấn *" data-en="Interview language *"></label><select name="interview_language" required><option value="1">Tiếng Việt</option><option value="2">English</option><option value="3">Deutsch</option></select></div>
        <div><label data-de="Interviewdatum *" data-vi="Ngày phỏng vấn *" data-en="Interview date *"></label><input name="interview_date" type="date" required></div>
      </div>
      <div class="btnRow"><button class="btn secondary" type="button" id="gpsBtn" data-de="GPS erfassen" data-vi="Lấy GPS" data-en="Capture GPS"></button><span class="small" id="gpsStatus">GPS: ---</span></div>
      <input type="hidden" name="gps_lat"><input type="hidden" name="gps_lng"><input type="hidden" name="time_start"><input type="hidden" name="time_end"><input type="hidden" name="duration_min"><input type="hidden" name="interview_id"><input type="hidden" name="total_score"><input type="hidden" name="photo_count" value="0">
    </section>

    <section class="step" data-step="2">
      <h1 class="stepTitle" data-de="2. Interesse & Zielgruppe" data-vi="2. Mức quan tâm & nhóm khách" data-en="2. Interest & target groups"></h1>
      <div class="formGrid">
        <div><label data-de="Functional Drinks im Sortiment? *" data-vi="Đang bán đồ uống chức năng? *" data-en="Selling functional drinks? *"></label><select name="has_functional_drinks" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="0" data-de="Nein" data-vi="Không" data-en="No"></option></select></div>
        <div><label data-de="Bereit zum Testen? *" data-vi="Sẵn sàng thử sản phẩm? *" data-en="Willing to test? *"></label><select name="willing_to_test" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div>
        <div class="condition hidden" data-condition="has_functional_drinks:1"><label data-de="Welche Produkte aktuell?" data-vi="Hiện đang bán sản phẩm nào?" data-en="Which products currently?"></label><textarea name="existing_products_text"></textarea></div>
        <div><label data-de="Begründung" data-vi="Lý do" data-en="Reason"></label><textarea name="reason_text"></textarea></div>
      </div>
      <h3 data-de="Passende Zielgruppen" data-vi="Nhóm khách phù hợp" data-en="Suitable target groups"></h3>
      <div class="checkGrid">
        <label class="checkItem"><input type="checkbox" name="target_tourists"><span data-de="Touristen" data-vi="Khách du lịch" data-en="Tourists"></span></label>
        <label class="checkItem"><input type="checkbox" name="target_office"><span data-de="Büroangestellte" data-vi="Nhân viên văn phòng" data-en="Office workers"></span></label>
        <label class="checkItem"><input type="checkbox" name="target_health"><span data-de="Gesundheitsbewusste" data-vi="Người quan tâm sức khỏe" data-en="Health-conscious"></span></label>
        <label class="checkItem"><input type="checkbox" name="target_young"><span data-de="Junge Zielgruppe" data-vi="Người trẻ" data-en="Young customers"></span></label>
        <label class="checkItem"><input type="checkbox" name="target_senior"><span data-de="Ältere Zielgruppe" data-vi="Người lớn tuổi" data-en="Senior customers"></span></label>
      </div>
    </section>

    <section class="step" data-step="3">
      <h1 class="stepTitle" data-de="3. Preis & Marge" data-vi="3. Giá & biên lợi nhuận" data-en="3. Price & margin"></h1>
      <div class="notice" data-de="⚠️ Interviewer-Hinweis: Erst die offenen Preisfragen stellen. Den Korea-Referenzpreis (ca. 60.000 VND) ERST AM ENDE dieses Abschnitts nennen – nach allen Preisangaben des Befragten." data-vi="⚠️ Lưu ý người phỏng vấn: Hỏi các câu hỏi giá mở trước. Chỉ nêu giá tham chiếu Hàn Quốc (khoảng 60.000 VND) SAU KHI đã ghi nhận tất cả ý kiến về giá của người được phỏng vấn." data-en="⚠️ Interviewer note: Ask open price questions first. Only mention the Korea reference price (approx. 60,000 VND) AFTER recording all price responses."></div>
      <div class="formGrid">
        <div><label data-de="Welcher VK-Preis wäre für Kunden realistisch? * (VND)" data-vi="Giá bán lẻ nào phù hợp với khách hàng? * (VND)" data-en="What retail price would be realistic for customers? * (VND)"></label><input name="retail_price_realistic" type="number" min="10000" max="200000" required></div>
        <div><label data-de="Ab welchem Preis wäre es zu teuer? * (VND)" data-vi="Giá nào thì khách thấy đắt quá? * (VND)" data-en="At what price would it be too expensive? * (VND)"></label><input name="retail_price_too_expensive" type="number" min="10000" max="300000" required></div>
        <div><label data-de="Welche Marge braucht Ihr Betrieb? * (% Aufschlag auf EK)" data-vi="Biên lợi nhuận cần thiết cho cơ sở? * (% lãi trên giá nhập)" data-en="Required margin for your business? * (% markup on purchase price)"></label><input name="margin_required_pct" type="number" min="10" max="200" required></div>
        <div><label data-de="Welchen EK-Preis würden Sie maximal akzeptieren? * (VND)" data-vi="Giá nhập tối đa bạn chấp nhận? * (VND)" data-en="Maximum acceptable purchase price? * (VND)"></label><input name="wholesale_price_accepted" type="number" min="5000" max="150000" required><div class="fieldHelp" id="wholesaleHint"></div></div>
        <div><label data-de="Würden Kunden 45.000 VND zahlen? *" data-vi="Khách có trả 45.000 VND không? *" data-en="Would customers pay 45,000 VND? *"></label><select name="accept_45k" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div>
        <div><label data-de="Würden Kunden 55.000 VND zahlen? *" data-vi="Khách có trả 55.000 VND không? *" data-en="Would customers pay 55,000 VND? *"></label><select name="accept_55k" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div>
        <div><label data-de="Würden Kunden 65.000 VND zahlen? *" data-vi="Khách có trả 65.000 VND không? *" data-en="Would customers pay 65,000 VND? *"></label><select name="accept_65k" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div>
        <div><div class="notice" data-de="ℹ️ Jetzt erwähnen: In Korea kostet eine Kapsel im Einzelhandel ca. 60.000 VND. Reaktion des Befragten notieren:" data-vi="ℹ️ Bây giờ nói: Ở Hàn Quốc, một viên capsule bán lẻ khoảng 60.000 VND. Ghi lại phản ứng của người được phỏng vấn:" data-en="ℹ️ Now mention: In Korea one capsule retails at approx. 60,000 VND. Note the respondent's reaction:"></div><textarea name="korea_price_reaction_text" maxlength="300" data-de="Reaktion auf Korea-Preis (60.000 VND)..." data-vi="Phản ứng với giá Hàn Quốc (60.000 VND)..." data-en="Reaction to Korea price (60,000 VND)..."></textarea></div>
      </div>
    </section>

    <section class="step" data-step="4">
      <h1 class="stepTitle" data-de="4. Produkt & Darreichungsform" data-vi="4. Sản phẩm & cách bán" data-en="4. Product & format"></h1>
      <div class="notice"
        data-de="Hinweis für Interviewer: Es geht NICHT um Sticks oder Geschenkboxen. Das aktuelle Produkt ist eine Ginseng-Kapsel für die Dolce-Gusto-Maschine. Prüfe nur, welche Verkaufsform für diesen Betrieb realistisch wäre."
        data-vi="Lưu ý cho người phỏng vấn: KHÔNG hỏi về dạng stick hoặc hộp quà. Sản phẩm hiện tại là viên hồng sâm dùng với máy Dolce Gusto. Chỉ kiểm tra hình thức bán nào phù hợp với cơ sở này."
        data-en="Interviewer note: Do NOT ask about sticks or gift boxes. The current product is a ginseng capsule for the Dolce Gusto machine. Only check which sales format fits this business."></div>

      <h3 data-de="Welche Verkaufsform passt zu diesem Betrieb?" data-vi="Hình thức bán nào phù hợp với cơ sở này?" data-en="Which sales format fits this business?"></h3>
      <div class="checkGrid">
        <label class="checkItem"><input type="checkbox" name="form_machine"><span data-de="Getränk aus Maschine im Café" data-vi="Đồ uống pha bằng máy tại quán" data-en="Drink prepared with machine in café"></span></label>
        <label class="checkItem"><input type="checkbox" name="form_hot_drink"><span data-de="Als heißes oder kaltes Premium-Getränk" data-vi="Đồ uống cao cấp nóng hoặc lạnh" data-en="Hot or cold premium drink"></span></label>
        <label class="checkItem"><input type="checkbox" name="form_bottle"><span data-de="10er-Box zum Mitnehmen / Verkauf" data-vi="Hộp 10 viên để bán mang về" data-en="10-capsule box for takeaway / retail"></span></label>
      </div>

      <div class="formGrid">
        <div><label data-de="Wäre eine Maschine im Betrieb praktisch möglich? *" data-vi="Có thể đặt máy tại cơ sở không? *" data-en="Would machine placement be practical? *"></label><select name="machine_feasibility" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div>
        <div><label data-de="Welche Bedingungen wären nötig?" data-vi="Cần điều kiện gì?" data-en="What conditions would be needed?"></label><textarea name="machine_conditions_text" data-de="z. B. Platz, Strom, Personal, Schulung..." data-vi="ví dụ: chỗ đặt, điện, nhân viên, hướng dẫn..." data-en="e.g. space, electricity, staff, training..."></textarea></div>
      </div>
    </section>


    <section class="step" data-step="5">
      <h1 class="stepTitle" data-de="5. Pilotfähigkeit & Testphase" data-vi="5. Khả năng thử nghiệm" data-en="5. Pilot readiness"></h1>
      <div class="notice"
        data-de="Pilot bedeutet: Erst Interviews sammeln. Danach wählen wir nur 3–4 passende Betriebe aus. Erst diese Betriebe bekommen eventuell Maschine und Testkapseln für einige Wochen."
        data-vi="Thử nghiệm nghĩa là: Trước tiên thu thập phỏng vấn. Sau đó chỉ chọn 3–4 cơ sở phù hợp. Chỉ các cơ sở này có thể nhận máy và viên mẫu trong vài tuần."
        data-en="Pilot means: First collect interviews. Then select only 3–4 suitable businesses. Only those may receive a machine and sample capsules for a few weeks."></div>
      <div class="formGrid">
        <div><label data-de="Grundsätzlich Interesse an Pilotprojekt? *" data-vi="Có quan tâm tham gia thử nghiệm không? *" data-en="General interest in pilot project? *"></label><select name="pilot_interest" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div>
        <div><label data-de="Sampling für Kunden möglich? *" data-vi="Có thể cho khách dùng thử không? *" data-en="Customer sampling possible? *"></label><select name="sampling_possible" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="2" data-de="Vielleicht" data-vi="Có thể" data-en="Maybe"></option><option value="3" data-de="Nein" data-vi="Không" data-en="No"></option></select></div>
        <div><label data-de="Geschätzte Verkäufe pro Woche, falls Pilot läuft *" data-vi="Ước tính bán mỗi tuần nếu thử nghiệm chạy *" data-en="Estimated weekly sales if pilot runs *"></label><input name="weekly_sales_estimate" type="number" min="0" max="10000" required></div>
        <div><label data-de="Sinnvolle Testmenge für Start (Kapseln)" data-vi="Số viên mẫu hợp lý để bắt đầu" data-en="Suggested sample quantity to start"></label><input name="pilot_capsules_suggested" type="number" min="0" max="200"></div>
      </div>
      <div><label data-de="Bedingungen oder Bedenken für Pilot" data-vi="Điều kiện hoặc lo ngại khi thử nghiệm" data-en="Conditions or concerns for pilot"></label><textarea name="pilot_conditions_text" data-de="z. B. Preis, Schulung, Gewinnspanne, Platz, Verantwortung..." data-vi="ví dụ: giá, hướng dẫn, biên lợi nhuận, chỗ đặt, trách nhiệm..." data-en="e.g. price, training, margin, space, responsibility..."></textarea></div>
    </section>


    <section class="step" data-step="6">
      <h1 class="stepTitle" data-de="6. Konkurrenz & Korean Branding" data-vi="6. Đối thủ & thương hiệu Hàn Quốc" data-en="6. Competition & Korean branding"></h1>
      <div class="formGrid">
        <div><label data-de="Ähnliche Produkte im Sortiment? *" data-vi="Cơ sở đang bán sản phẩm tương tự? *" data-en="Similar products in range? *"></label><select name="has_similar_products" required><option value="">---</option><option value="1" data-de="Ja" data-vi="Có" data-en="Yes"></option><option value="0" data-de="Nein" data-vi="Không" data-en="No"></option></select></div>
        <div class="condition hidden" data-condition="has_similar_products:1"><label data-de="Welche ähnlichen Produkte?" data-vi="Sản phẩm tương tự là gì?" data-en="Which similar products?"></label><textarea name="similar_products_text"></textarea></div>
        <div><label data-de="Was läuft gut im Betrieb?" data-vi="Sản phẩm nào bán chạy?" data-en="What sells well?"></label><textarea name="best_selling_text"></textarea></div>
        <div><label data-de="Was läuft schlecht?" data-vi="Sản phẩm nào bán kém?" data-en="What sells poorly?"></label><textarea name="poor_selling_text"></textarea></div>
        <div><label data-de="Wirkung von Korean Branding? *" data-vi="Thương hiệu Hàn Quốc có ảnh hưởng thế nào? *" data-en="Effect of Korean branding? *"></label><select name="korean_branding_effect" required><option value="">---</option><option value="1" data-de="Plus – hilft Verkauf" data-vi="Tích cực – giúp bán hàng" data-en="Plus – helps sales"></option><option value="2" data-de="Neutral" data-vi="Trung lập" data-en="Neutral"></option><option value="3" data-de="Minus – Nachteil" data-vi="Tiêu cực – bất lợi" data-en="Minus – disadvantage"></option></select></div>
        <div><label data-de="Begründung Korean Branding" data-vi="Lý do về thương hiệu Hàn Quốc" data-en="Korean branding reason"></label><textarea name="korean_branding_reason_text"></textarea></div>
      </div>
    </section>

    <section class="step" data-step="7">
      <h1 class="stepTitle" data-de="7. Bewertung & Abschluss" data-vi="7. Đánh giá & kết thúc" data-en="7. Rating & finish"></h1>
      <p><label data-de="Wichtigstes Zitat aus dem Gespräch *" data-vi="Câu trả lời quan trọng nhất *" data-en="Most important quote from interview *"></label><textarea name="key_quote_text" maxlength="500" required data-de="Wörtliches Zitat des Befragten..." data-vi="Trích dẫn trực tiếp của người được phỏng vấn..." data-en="Direct quote from respondent..."></textarea></p>
      <div class="formGrid">
        <div class="scaleWrap"><label data-de="Interesse-Score *" data-vi="Mức độ quan tâm *" data-en="Interest score *"></label><input type="hidden" name="score_interest" required><div class="scale" data-scale-buttons="score_interest"></div><div class="anchors" data-anchor="score_interest"></div></div>
        <div class="scaleWrap"><label data-de="Premium-Fit *" data-vi="Độ phù hợp Premium *" data-en="Premium fit *"></label><input type="hidden" name="score_premium_fit" required><div class="scale" data-scale-buttons="score_premium_fit"></div><div class="anchors" data-anchor="score_premium_fit"></div></div>
        <div class="scaleWrap"><label data-de="Korea-Fit *" data-vi="Độ phù hợp thương hiệu Hàn Quốc *" data-en="Korea fit *"></label><input type="hidden" name="score_korean_fit" required><div class="scale" data-scale-buttons="score_korean_fit"></div><div class="anchors" data-anchor="score_korean_fit"></div></div>
        <div class="scaleWrap"><label data-de="Erwarteter Absatz *" data-vi="Doanh số dự kiến *" data-en="Expected sales *"></label><input type="hidden" name="score_expected_sales" required><div class="scale" data-scale-buttons="score_expected_sales"></div><div class="anchors" data-anchor="score_expected_sales"></div></div>
        <div class="scaleWrap"><label data-de="Pilot-Bereitschaft *" data-vi="Sẵn sàng tham gia thử nghiệm? *" data-en="Pilot openness *"></label><input type="hidden" name="score_pilot_openness" required><div class="scale" data-scale-buttons="score_pilot_openness"></div><div class="anchors" data-anchor="score_pilot_openness"></div></div>
        <div><label data-de="Gesamtpunktzahl" data-vi="Tổng điểm" data-en="Total score"></label><div class="totalScore"><span id="totalScoreView">0</span>/25</div></div>

</div><script src="app.js"></script><script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://rote-ginseng-vn-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.HongShotFirebase = {
    async saveB2BInterview(payload) {
      if (!payload || !payload.interview_id) throw new Error("Missing interview_id");
      await set(ref(db, `b2b_interviews/${payload.interview_id}`), {
        ...payload,
        ts_server_utc: serverTimestamp()
      });
    }
  };
</script><script src="b2b.js"></script></body></html>
